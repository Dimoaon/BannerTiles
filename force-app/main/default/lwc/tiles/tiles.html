<template>
    <div lwc:dom="manual" class="custom-css-container"></div>

    <div class="tiles-container">
        <div class="tiles-grid">
            <template for:each={tiles} for:item="tile">

                <template lwc:if={tile.show}>

                    <div key={tile.index}
                         class={tile.class}
                         onclick={tile.click}
                         onkeydown={tile.keydown}
                         tabindex="0"
                         role="link"
                         aria-label="Open the link">

                        <div class={tile.imageClass}></div>

                        <template lwc:if={tile.showTitle}>
                            <div class="tile-title">
                                {tile.title}
                            </div>
                        </template>

                        <template lwc:if={tile.showDescription}>
                            <div class="tile-description">
                                {tile.description}
                            </div>
                        </template>

                    </div>

                </template>

            </template>
        </div>
    </div>
</template>
