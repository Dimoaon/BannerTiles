<template>
    <div lwc:dom="manual" class="custom-css-container"></div>

    <div class="banner">
        <div class="banner-content">

            <template lwc:if={getShowTitle}>
                <div class="banner-title">
                    {title}
                </div>
            </template>

            <template lwc:if={getShowSubtitle}>
                <div class="banner-subtitle">
                    {subtitle}
                </div>
            </template>

        </div>
    </div>
</template>
